# k-nearest-neighbours: a strong non-parametric candidate on pixel data.
run_name: knn
model:
  type: knn
  params:
    n_neighbors: 5
    weights: distance
data:
  dataset: digits
  test_size: 0.2
  val_size: 0.2
  random_state: 42
notes: "Distance-weighted kNN; competitive on image-like features."
